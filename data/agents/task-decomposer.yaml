name: Task Decomposer
repo: https://github.com/sametcelikbicak/task-decomposer
tagline: Decompose complex requests
description: An AI agent skill that helps developers decompose complex requests into structured, AI-friendly task sequences. Optimizes context window usage, manages multi-session workflows, and produces better results from fewer, more focused prompts. Compatible with opencode, Claude Code, Cursor, Windsurf, and GitHub Copilot.
