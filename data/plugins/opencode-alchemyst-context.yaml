name: OpenCode Alchemyst Context
repo: https://github.com/alchemyst-ai/opencode-alchemyst-context
tagline: Connect your coding agents with your business operational intelligence.
description: "A plugin that solves the \"AI amnesia\" problem for opencode agents. By default, AI coding assistants only know what's in their current conversation. This plugin gives agents persistent, retrievable memory via the AlchemystAI Context Layer (https://getalchemystai.com) — business decisions, team conventions, API docs, code snippets, and reference material all survive across sessions. Ships six tools (context_search, context_add, context_ask, memory_add, memory_update, configure), a tiered memory model distinguishing intentional context from session memory, grounded Q&A that synthesizes answers from stored context, a heuristic security guard that blocks secrets before they're sent, and graceful degradation when unconfigured."
