name: OpenCode Pollinations Plugin
repo: https://github.com/fkom13/opencode-pollinations-plugin
tagline: Full Pollinations.ai integration — free unlimited AI models, 17+ multimodal tools, hourly free tiers & Safety Net.
description: The ultimate bridge between OpenCode and the Pollinations.ai ecosystem. Access 30+ free and enterprise AI models (OpenAI, Gemini, Mistral, Claude...) with hourly Pollen resets. Includes 17+ agent tools (image, video, audio, music generation, background removal, web search, transcription, QR codes, diagrams). Features a robust Safety Net with auto-fallback, Cost Guard for agent spending control, API Explorer V4, and full i18n support (EN/FR/ES/DE/IT/ZH). ~20K NPM downloads, cross-platform (Windows/macOS/Linux).
