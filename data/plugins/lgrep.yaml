name: lgrep
repo: https://github.com/Sharper-Flow/lgrep
tagline: Semantic search and symbol intelligence for Opencode
description: Dual-engine code intelligence plugin that gives Opencode agents semantic code search, exact symbol lookup, file and repo outlines, and local-first indexes backed by Voyage Code 3 and tree-sitter.
scope:
  - global
tags:
  - code-search
  - semantic-search
  - mcp
  - tree-sitter
  - code-intelligence
homepage: https://github.com/Sharper-Flow/lgrep
installation: |
  ```bash
  pip install git+https://github.com/Sharper-Flow/lgrep.git
  lgrep install-opencode
  ```

  The semantic engine requires a `VOYAGE_API_KEY`. The symbol engine works without an API key.
