name: Mem0 OpenCode Plugin
repo: https://github.com/mem0ai/mem0
tagline: Persistent memory plugin so your agent remembers across sessions
description: OpenCode plugin that gives your agent persistent memory powered by Mem0. Includes 9 MCP memory tools, 16 slash commands, and lifecycle hooks that auto-capture decisions, search prior context at session start, and pre-fetch error memories on failures. Install with `opencode plugin @mem0/opencode-plugin`.
