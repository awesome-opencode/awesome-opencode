name: opencode-lens
repo: https://github.com/wuxiaoqiang12/opencode-lens
homepage: https://github.com/wuxiaoqiang12/opencode-lens
tagline: TUI bridge and MCP toolkit for inspecting and controlling live opencode sessions
description: opencode-lens is an opencode TUI plugin plus MCP server that lets external agents inspect running opencode instances, send prompts, read messages/diffs/todos, handle permission and question prompts, and monitor session completion through a local Unix socket bridge.
scope:
  - global
tags:
  - mcp
  - tui
  - automation
  - sessions
  - monitoring
installation: |
  Add the TUI plugin to `~/.config/opencode/tui.json`:

  ```json
  {
    "$schema": "https://opencode.ai/tui.json",
    "plugin": ["opencode-lens"]
  }
  ```

  Restart opencode. opencode resolves and caches the npm plugin package automatically.

  For Hermes or other MCP clients, run the MCP server with `npx`:

  ```yaml
  mcp_servers:
    opencode-lens:
      command: npx
      args:
        - -y
        - opencode-lens-mcp
      enabled: true
  ```
