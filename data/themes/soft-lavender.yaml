name: Soft Lavender
repo: https://github.com/Gojer16/Soft-Lavender-Opencode
tagline: A family of hand-crafted themes with soft purples and complementary accent palettes.
description: A family of hand-crafted themes for OpenCode AI, built around soft purples with complementary accent palettes. Includes four variants: Soft Lavender (deep violet), Soft Lavender Light (bright lavender on near-white), Soft Lavender Cream (warm cream with honey and sage), and Soft Lavender Rose (blush rose tones).